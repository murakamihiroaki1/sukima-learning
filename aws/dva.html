    <script>
        function scrollToEl(el) { const top = el.getBoundingClientRect().top + window.scrollY - 68; window.scrollTo({ top, behavior: 'smooth' }); }
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let score = 0;
        let questions = [];
        let selectedMode = null;
        let selectedCategory = null;
        let selectedRange = null;
        let isMockExam = false; // 模擬試験モードフラグ
        
        // 出題方法を選択
        async function selectMode(mode, clickedBtn) {
            selectedMode = mode;
            selectedCategory = null;
            selectedRange = null;
            
            // すべてのボタンからactiveクラスを削除
            document.querySelectorAll('.set-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 選択されたボタンにactiveクラスを追加
            if (clickedBtn) clickedBtn.classList.add('active');
            
            // すべての選択セクションを非表示
            document.getElementById('sequential-selection').style.display = 'none';
            document.getElementById('category-selection').style.display = 'none';
            document.getElementById('start-quiz-btn').disabled = true;
            
            // 会員情報を取得（大文字小文字を正規化）
            const membership = await getMembershipInfo();
            const lowerLevel = (membership ? membership.level : 'free').toLowerCase();
            const isPremium = (lowerLevel === 'standard' || lowerLevel === 'advanced');
            const isAdvancedUser = (lowerLevel === 'advanced');
            
            if (mode === 'sequential') {
                // 番号順: 10問単位のボタンを生成
                const totalQuestions = questionsData.length;
                const sequentialButtons = document.getElementById('sequential-buttons');
                sequentialButtons.innerHTML = '';
                
                for (let i = 0; i < totalQuestions; i += 10) {
                    const end = Math.min(i + 10, totalQuestions);
                    const btn = document.createElement('button');
                    btn.className = 'set-btn';
                    btn.textContent = `問題 ${i + 1}-${end}`;
                    btn.onclick = () => selectRange(i, end, btn);
                    sequentialButtons.appendChild(btn);
                }
                
                // アクセス制御を適用（問題21以降をグレーアウト）
                await applyAccessControlToButtons('dva');
                
                document.getElementById('sequential-selection').style.display = 'block';
                document.getElementById('set-info').style.display = 'block';
                document.getElementById('set-info').textContent = '問題範囲を選択してください';
                if (window.innerWidth <= 768) {

        // 番号順の範囲を選択
        function selectRange(start, end, clickedBtn) {
            selectedRange = { start, end };
            
            // ボタンのアクティブ状態を更新
            document.querySelectorAll('#sequential-buttons .set-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (clickedBtn) clickedBtn.classList.add('active');
            
            document.getElementById('set-info').textContent =
                `問題 ${start + 1}-${end} を選択しました（${end - start}問）`;
            document.getElementById('start-quiz-btn').disabled = false;
        }

        // カテゴリを選択
        function selectCategory(category, btnEl) {
            selectedCategory = category;
            selectedRange = null;
            document.querySelectorAll('#category-buttons .set-btn').forEach(b => b.classList.remove('active'));
            if (btnEl) btnEl.classList.add('active');
            const count = questionsData.filter(q => q.category === category).length;
            document.getElementById('set-info').textContent = `「${category}」を選択しました（${count}問）`;
            document.getElementById('start-quiz-btn').disabled = false;
        }

        // クイズを開始
        function startQuiz() {
            if (!selectedMode) return;
            
            // 問題を取得
            if (selectedMode === 'sequential') {
                // 番号順
                if (!selectedRange) return;
                questions = questionsData.slice(selectedRange.start, selectedRange.end);
            } else if (selectedMode === 'category') {
                // カテゴリ別
                if (!selectedCategory) return;
                const filteredQuestions = questionsData.filter(q => q.category === selectedCategory);
                if (selectedRange) {
                    questions = filteredQuestions.slice(selectedRange.start, selectedRange.end);
                } else {
                    questions = filteredQuestions;
                }
            } else if (selectedMode === 'random') {
                // ランダム10問
                const shuffled = [...questionsData].sort(() => Math.random() - 0.5);
                questions = shuffled.slice(0, 10);
            } else if (selectedMode === 'mock-exam') {
                // 模擬試験モード: ランダム65問
                const shuffled = [...questionsData].sort(() => Math.random() - 0.5);
                questions = shuffled.slice(0, Math.min(65, questionsData.length));
            }
            
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            score = 0;
            
            // セクションを切り替え
            document.getElementById('set-selection-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            
            displayQuestion();
        }

        // 問題を表示
        function displayQuestion() {
            const question = questions[currentQuestionIndex];
            document.getElementById('question-text').textContent = question.question;
            document.getElementById('question-number').textContent = 
                `問題 ${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('score-display').textContent = `正解数: ${score}`;

            // 進捗バーを更新
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';

            // 選択肢を表示
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const labels = ['A', 'B', 'C', 'D'];
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `
                    <span class="option-label">${labels[index]}</span>
                    <span>${option}</span>
                `;
                
                // 既に回答済みの場合
                if (userAnswers[currentQuestionIndex] !== null) {
                    optionDiv.classList.add('disabled');
                    if (index === question.correctAnswer) {
                        optionDiv.classList.add('correct');
                    }
                    if (index === userAnswers[currentQuestionIndex] && index !== question.correctAnswer) {
                        optionDiv.classList.add('incorrect');
                    }
                } else {
                    optionDiv.onclick = () => selectOption(index);
                }
                
                optionsContainer.appendChild(optionDiv);
            });

            // 解説の表示/非表示
            const explanationDiv = document.getElementById('explanation');
            const referenceDiv = document.getElementById('reference');
            if (userAnswers[currentQuestionIndex] !== null) {
                // 各選択肢の解説がある場合は表示
                if (question.optionExplanations && question.optionExplanations.length > 0) {
                    let explanationHTML = '<div style="margin-bottom: 15px;"><strong>各選択肢の解説:</strong></div>';
                    question.optionExplanations.forEach((exp, index) => {
                        const label = ['A', 'B', 'C', 'D'][index];
                        const isCorrect = index === question.correctAnswer;
                        const isSelected = index === userAnswers[currentQuestionIndex];
                        let style = 'padding: 10px; margin-bottom: 10px; border-left: 3px solid ';
                        
                        if (isCorrect) {
                            style += '#4CAF50; background: #f1f8f4;';
                        } else if (isSelected) {
                            style += '#f44336; background: #fef1f1;';
                        } else {
                            style += '#e0e0e0; background: #f9f9f9;';
                        }
                        
                        explanationHTML += `<div style="${style}"><strong>${label}.</strong> ${exp}</div>`;

                        referenceLinksContainer.appendChild(linkDiv);

                    link.href = question.reference;
                    link.className = 'reference-link';
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.textContent = `📖 ${question.reference}`;
                    linkDiv.appendChild(link);
                    referenceLinksContainer.appendChild(linkDiv);

        // 選択肢を選択
        function selectOption(selectedIndex) {
            if (userAnswers[currentQuestionIndex] !== null) return;

            const question = questions[currentQuestionIndex];
            userAnswers[currentQuestionIndex] = selectedIndex;

            if (selectedIndex === question.correctAnswer) {

            // 選択肢の状態を更新

            } else {
                document.getElementById('explanation-text').textContent = question.explanation;
            }
            document.getElementById('explanation').classList.add('show');
            
            // スマホ閲覧時: 解説までスクロール
            if (window.innerWidth <= 768) {
                setTimeout(() => {
                    scrollToEl(document.getElementById('explanation'));

            // 参考リンクを表示
            const referenceLinksContainer = document.getElementById('reference-links');
            referenceLinksContainer.innerHTML = '';
            
            if (question.references && question.references.length > 0) {
                question.references.forEach((ref, index) => {
                    const linkDiv = document.createElement('div');
                    linkDiv.style.marginBottom = '8px';
                    
                    const link = document.createElement('a');
                    // refがオブジェクトの場合とURLの場合の両方に対応
                    link.href = typeof ref === 'object' ? ref.url : ref;
                    link.className = 'reference-link';
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.textContent = `📖 ${typeof ref === 'object' ? ref.title : ref.split('/').pop().replace(/-/g, ' ')}`;

                    referenceLinksContainer.appendChild(linkDiv);

            } else if (question.reference) {
                // 後方互換性: 単一のreferenceフィールドもサポート
                const linkDiv = document.createElement('div');
                const link = document.createElement('a');
                link.href = question.reference;

                link.rel = 'noopener noreferrer';
                link.textContent = `📖 ${question.reference}`;
                linkDiv.appendChild(link);
                referenceLinksContainer.appendChild(linkDiv);
                document.getElementById('reference').classList.add('show');
            }
            
            document.getElementById('score-display').textContent = `正解数: ${score}`;
        }

        // 次の問題へ

            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;

                window.scrollTo({ top: 0, behavior: 'smooth' });

            if (currentQuestionIndex > 0) {

        }

        // ログイン状態チェック機能
        const API_URL = 'https://sukima-learning.onrender.com/api/auth';

        async function checkLoginStatus() {
            const accessToken = localStorage.getItem('accessToken');
            
            if (!accessToken) {
                showLoggedOut();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/me`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    showLoggedIn(data.user.username, data.user.membership_level, data.user.membership_expiry);
                    updatePremiumFeatureAccess(data.user.membership_level);
                } else {
                    const refreshed = await tryRefreshToken();
                    if (!refreshed) {
                        showLoggedOut();
                        clearAuthData();
                    }
                }
            } catch (error) {
                console.error('Error checking login status:', error);
                showLoggedOut();
            }
        }

        async function tryRefreshToken() {
            const refreshToken = localStorage.getItem('refreshToken');
            
            if (!refreshToken) {
                return false;
            }

            try {
                const response = await fetch(`${API_URL}/refresh`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ refreshToken })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('accessToken', data.accessToken);
                    
                    const userResponse = await fetch(`${API_URL}/me`, {
                        headers: {
                            'Authorization': `Bearer ${data.accessToken}`
                        }
                    });
                    
                    if (userResponse.ok) {
                        const userData = await userResponse.json();
                        showLoggedIn(userData.user.username, userData.user.membership_level, userData.user.membership_expiry);
                        updatePremiumFeatureAccess(userData.user.membership_level);
                        return true;
                    }
                }
                
                return false;
            } catch (error) {
                console.error('Error refreshing token:', error);
                return false;
            }
        }

        function showLoggedIn(username, membershipLevel = 'Free', membershipExpiry = null) {

            const _li1 = document.querySelector('.logged-in'); if (_li1) _li1.style.display = 'flex';

                    userPlanElement.style.background = '#9e9e9e';

                    userPlanElement.style.background = '#FF9900';
                } else if (lowerLevel === 'advanced') {
                    userPlanElement.style.background = '#667eea';
                }
            }
            
            // 有効期限を表示
            const userExpiryElement = document.getElementById('userExpiry');
            if (userExpiryElement && membershipExpiry && membershipLevel.toLowerCase() !== 'free') {
                const expiryDate = new Date(membershipExpiry);
                const formattedDate = `${expiryDate.getFullYear()}/${String(expiryDate.getMonth() + 1).padStart(2, '0')}/${String(expiryDate.getDate()).padStart(2, '0')}`;
                userExpiryElement.textContent = `有効期限: ${formattedDate}`;
                userExpiryElement.style.display = 'inline-block';
            } else if (userExpiryElement) {
                userExpiryElement.style.display = 'none';
            }
        }

        function showLoggedOut() {
            const _lo2 = document.querySelector('.logged-out'); if (_lo2) _lo2.style.display = 'flex';
            const _li2 = document.querySelector('.logged-in'); if (_li2) _li2.style.display = 'none';
            updatePremiumFeatureAccess('free');
        }
        
        function updatePremiumFeatureAccess(membershipLevel) {
            const lowerLevel = membershipLevel.toLowerCase();
            const isPremium = (lowerLevel === 'standard' || lowerLevel === 'advanced');
            
            const categoryBtn = document.getElementById('category-mode-btn');
            const randomBtn = document.getElementById('random-mode-btn');
            const mockExamBtn = document.getElementById('mock-exam-mode-btn');
            
            if (isPremium) {
                // Standard/Advanced会員: ボタンを有効化
                if (categoryBtn) {
                    categoryBtn.style.opacity = '1';
                    categoryBtn.style.cursor = 'pointer';
                    categoryBtn.onclick = function() { selectMode('category'); };
                    categoryBtn.innerHTML = 'カテゴリ別';
                }
                if (randomBtn) {
                    randomBtn.style.opacity = '1';
                    randomBtn.style.cursor = 'pointer';
                    randomBtn.onclick = function() { selectMode('random'); };
                    randomBtn.innerHTML = 'ランダム (10問)';
                }
                if (mockExamBtn) {
                    mockExamBtn.style.opacity = '1';
                    mockExamBtn.style.cursor = 'pointer';
                    mockExamBtn.onclick = function() { selectMode('mock-exam'); };
                    mockExamBtn.innerHTML = '模擬試験 (65問)';
                }
            } else {
                // Free会員: ボタンを無効化
                if (categoryBtn) {
                    categoryBtn.style.opacity = '0.4';
                    categoryBtn.style.cursor = 'not-allowed';
                    categoryBtn.onclick = function(event) { event.preventDefault(); window.location.href='pricing.html'; };
                    categoryBtn.innerHTML = 'カテゴリ別 🔒';
                }
                if (randomBtn) {
                    randomBtn.style.opacity = '0.4';
                    randomBtn.style.cursor = 'not-allowed';
                    randomBtn.onclick = function(event) { event.preventDefault(); window.location.href='pricing.html'; };
                    randomBtn.innerHTML = 'ランダム (10問) 🔒';
                }
                if (mockExamBtn) {
                    mockExamBtn.style.opacity = '0.4';
                    mockExamBtn.style.cursor = 'not-allowed';
                    mockExamBtn.onclick = function(event) { event.preventDefault(); window.location.href='pricing.html'; };
                    mockExamBtn.innerHTML = '模擬試験 (65問) 🔒';
                }
            }
        }

        function clearAuthData() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
        }

        async function handleLogout() {
            const accessToken = localStorage.getItem('accessToken');
            const refreshToken = localStorage.getItem('refreshToken');

            if (accessToken && refreshToken) {
                try {
                    await fetch(`${API_URL}/logout`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ refreshToken })
                    });
                } catch (error) {
                    console.error('Error during logout:', error);
                }
            }

            clearAuthData();
            showLoggedOut();
        }

        // 自動ログアウトタイマー（30分）
        let inactivityTimer;
        const INACTIVITY_TIMEOUT = 30 * 60 * 1000;

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            
            const accessToken = localStorage.getItem('accessToken');
            if (accessToken) {
                inactivityTimer = setTimeout(() => {
                    console.log('30分間操作がなかったため自動ログアウトします');
                    handleLogout();
                }, INACTIVITY_TIMEOUT);
            }
        }

        ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'].forEach(event => {
            document.addEventListener(event, resetInactivityTimer, true);
        });

        // ページ読み込み時
        window.onload = async function() {
            await checkLoginStatus();
            resetInactivityTimer();
        };
        
        // ===== アクセス制御: 未ログイン・Free会員は1-20問のみ =====
        // 元のstartQuiz関数を保存
        const _originalStartQuiz = startQuiz;
        
        // startQuiz関数をアクセス制御付きで上書き
        startQuiz = async function() {
            if (!selectedMode) return;
            
            // 会員情報を取得
            const membership = await getMembershipInfo();
            const lowerLevel = membership.level.toLowerCase();
            const isAdvanced = (lowerLevel === 'advanced');
            
            let baseQuestions = [];
            
            if (selectedMode === 'sequential') {
                if (!selectedRange) return;
                baseQuestions = questionsData.slice(selectedRange.start, selectedRange.end);
            } else if (selectedMode === 'category') {
                if (!selectedCategory) return;
                const filteredQuestions = questionsData.filter(q => q.category === selectedCategory);
                if (selectedRange) {
                    baseQuestions = filteredQuestions.slice(selectedRange.start, selectedRange.end);
                } else {
                    baseQuestions = filteredQuestions;
                }
            } else if (selectedMode === 'random') {
                const shuffled = [...questionsData].sort(() => Math.random() - 0.5);
                baseQuestions = shuffled.slice(0, 10);
            } else if (selectedMode === 'mock-exam') {
                // 模擬試験モード: ランダムに65問
                const shuffled = [...questionsData].sort(() => Math.random() - 0.5);
                baseQuestions = shuffled.slice(0, 65);
            }
            
            // Advancedプランの場合、DVA試験は全問アクセス可能なのでフィルタリングをスキップ
            if (isAdvanced || selectedMode === 'mock-exam') {
                questions = baseQuestions;
            } else {
                // Free/Standard会員はアクセス可能な問題にフィルタリング
                questions = filterQuestionsByAccess(baseQuestions, membership, 'dva');
            }
            
            // フィルタリング後に問題がない場合
            if (questions.length === 0) {
                alert('アクセス可能な問題がありません。\n\nFree会員は問題1-20のみアクセス可能です。\nすべての問題にアクセスするには、Standardプランにアップグレードしてください。');
                window.location.href = 'pricing.html';
                return;
            }
            
            // 会員バッジを表示（メッセージは表示しない）
            displayMembershipBadge(membership);
            
            // クイズを開始
            currentQuestionIndex = 0;
            score = 0;
            // userAnswersを問題数分nullで初期化
            userAnswers = new Array(questions.length).fill(null);
            
            document.getElementById('set-selection-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            
            displayQuestion();
        };
    </script>
