<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードリセット - AWS 認定試験 対策</title>
    <link rel="stylesheet" href="nav-styles.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #FF9900;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #FF9900;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #ec8b00;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #FF9900;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            color: #ec8b00;
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #FF9900;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #resetForm {
            display: none;
        }

        .password-strength {
            height: 5px;
            background-color: #e0e0e0;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }

        .password-strength-bar.weak {
            width: 33%;
            background-color: #f44336;
        }

        .password-strength-bar.medium {
            width: 66%;
            background-color: #ff9800;
        }

        .password-strength-bar.strong {
            width: 100%;
            background-color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 新しいパスワード</h1>
        <p class="subtitle">新しいパスワードを設定してください</p>

        <div id="message" class="message"></div>

        <div class="loading" id="verifyLoading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">トークンを確認中...</p>
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label for="password">新しいパスワード</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="8文字以上"
                    autocomplete="new-password"
                >
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <div class="password-requirements">
                    ※ 8文字以上で設定してください
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">パスワード（確認）</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    required 
                    placeholder="もう一度入力してください"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn" id="submitBtn">
                パスワードをリセット
            </button>

            <div class="loading" id="submitLoading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">処理中...</p>
            </div>
        </form>

        <div class="back-link">
            <a href="login.html">← ログインページに戻る</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://sukima-learning-api.onrender.com/api/auth';

        const form = document.getElementById('resetForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const verifyLoading = document.getElementById('verifyLoading');
        const submitLoading = document.getElementById('submitLoading');
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');

        let resetToken = null;

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        // パスワード強度チェック
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strength = calculatePasswordStrength(password);
            
            strengthBar.className = 'password-strength-bar';
            if (strength >= 8) {
                strengthBar.classList.add('strong');
            } else if (strength >= 5) {
                strengthBar.classList.add('medium');
            } else if (strength > 0) {
                strengthBar.classList.add('weak');
            }
        });

        function calculatePasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength += 3;
            if (password.length >= 12) strength += 2;
            if (/[a-z]/.test(password)) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 2;
            return strength;
        }

        // URLからトークンを取得
        function getTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        // トークンを検証
        async function verifyToken() {
            resetToken = getTokenFromURL();

            if (!resetToken) {
                showMessage('無効なリンクです', 'error');
                return;
            }

            verifyLoading.style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/reset-password/${resetToken}`);
                const data = await response.json();

                if (response.ok) {
                    form.style.display = 'block';
                    showMessage(`${data.email} のパスワードをリセットします`, 'info');
                } else {
                    showMessage(data.error || '無効または期限切れのトークンです', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('サーバーとの通信に失敗しました', 'error');
            } finally {
                verifyLoading.style.display = 'none';
            }
        }

        // フォーム送信
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const password = passwordInput.value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password.length < 8) {
                showMessage('パスワードは8文字以上である必要があります', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('パスワードが一致しません', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitLoading.style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('パスワードが正常にリセットされました。ログインページに移動します...', 'success');
                    form.reset();
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showMessage(data.error || 'エラーが発生しました', 'error');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('サーバーとの通信に失敗しました', 'error');
                submitBtn.disabled = false;
            } finally {
                submitLoading.style.display = 'none';
            }
        });

        // ページ読み込み時にトークンを検証
        verifyToken();
    </script>
    <script src="nav-component.js"></script>
</body>
</html>
